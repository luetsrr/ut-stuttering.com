name: Deploy to GitHub Pages

on:
  # `main` ブランチにプッシュするたびにワークフローを実行します
  push:
    branches: [main]
  # このワークフローを GitHub の Actions タブから手動で実行できるようにします
  workflow_dispatch:

# このジョブがリポジトリをクローンし、ページデプロイメントを作成することを許可します
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      # Astro公式のアクションを使用して、インストール・ビルド・アップロードを全自動で行います
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # pnpmを使用することを明示（リポジトリにpnpm-lock.yamlがあれば自動検出もされます）
          package-manager: pnpm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
